version: 2.1

# ---------------------------------------------------------------------------
# Orbs
# ---------------------------------------------------------------------------
orbs:
  node: circleci/node@6

# ---------------------------------------------------------------------------
# Reusable executor
# ---------------------------------------------------------------------------
executors:
  default:
    docker:
      - image: cimg/base:current

# ---------------------------------------------------------------------------
# Reusable commands
# ---------------------------------------------------------------------------
commands:
  install-deps:
    description: >
      Install the requested Node.js version (via nvm) and restore/save the
      pnpm store cache, then install frozen dependencies.
    parameters:
      node-version:
        type: string
        default: "22"
    steps:
      - node/install:
          node-version: << parameters.node-version >>
      - node/install-packages:
          pkg-manager: pnpm
          # Bump cache-version (e.g. v2) to force a fresh cache when needed.
          cache-version: v1

# ---------------------------------------------------------------------------
# Jobs
# ---------------------------------------------------------------------------
jobs:
  # ── Static checks (run once on LTS, not worth matrix-ing) ─────────────────
  lint:
    executor: default
    resource_class: small
    steps:
      - checkout
      - install-deps
      - run:
          name: ESLint
          command: pnpm run lint
      - run:
          name: Security audit (moderate+, prod deps only)
          command: pnpm audit --audit-level=moderate --prod

  type-check:
    executor: default
    resource_class: small
    steps:
      - checkout
      - install-deps
      - run:
          name: TypeScript type check
          command: pnpm exec tsc --noEmit

  # ── Unit tests ─────────────────────────────────────────────────────────────
  #
  # Uses `circleci tests run` (not the older `circleci tests split`) which
  # enables the full CircleCI Smarter Testing stack:
  #
  #   1. Timing-based load balancing – splits test files across `parallelism`
  #      containers weighted by historical duration so all containers finish
  #      at roughly the same time.
  #
  #   2. Selective test execution – when CircleCI Smarter Testing is enabled
  #      in project settings, only tests linked to files changed in the
  #      current PR are run, skipping unrelated tests entirely.
  #
  #   3. Failed-test reruns – retrying a failed job re-runs only the tests
  #      that failed, not the full suite, cutting retry time dramatically.
  #
  # JUnit XML (written by jest-junit, configured in stencil.config.ts) is
  # read by `circleci tests run --test-results-path` and then stored via
  # `store_test_results` to feed timing data for future splits.
  #
  # Files matched by stencil.config.unit.ts testRegex:
  #   src/(utils|services)/**.spec.ts  and  **.unit.spec.ts  (19 files today)
  test-unit:
    parameters:
      node-version:
        type: string
    executor: default
    resource_class: medium
    parallelism: 4
    environment:
      JEST_JUNIT_OUTPUT_DIR: ./test-results/unit
    steps:
      - checkout
      - install-deps:
          node-version: << parameters.node-version >>
      - run:
          name: Run unit tests (CircleCI Smarter Testing)
          command: |
            mkdir -p ./test-results/unit

            # `circleci tests run` replaces {test_names} with the space-separated
            # file paths assigned to THIS container after timing-based splitting.
            # scripts/run-stencil-tests.sh converts them to a Jest testPathPattern.
            circleci tests glob \
              "src/**/*.unit.spec.ts" \
              "src/utils/**/*.spec.ts" \
              "src/services/**/*.spec.ts" | \
            circleci tests run \
              --command="./scripts/run-stencil-tests.sh stencil.config.unit.ts {test_names}" \
              --split-by=timings \
              --timings-type=filename \
              --test-results-path="./test-results/unit"
      - store_test_results:
          path: ./test-results

  # ── Component (rendering) tests ────────────────────────────────────────────
  #
  # Same Smarter Testing setup as test-unit.
  # Files matched by stencil.config.component.ts testRegex: **.spec.tsx
  # Currently 8 files; parallelism: 2 gives ~4 files per container.
  # Raise parallelism as the component suite grows.
  test-component:
    parameters:
      node-version:
        type: string
    executor: default
    resource_class: medium
    parallelism: 2
    environment:
      JEST_JUNIT_OUTPUT_DIR: ./test-results/component
    steps:
      - checkout
      - install-deps:
          node-version: << parameters.node-version >>
      - run:
          name: Run component tests (CircleCI Smarter Testing)
          command: |
            mkdir -p ./test-results/component

            circleci tests glob "src/**/*.spec.tsx" | \
            circleci tests run \
              --command="./scripts/run-stencil-tests.sh stencil.config.component.ts {test_names}" \
              --split-by=timings \
              --timings-type=filename \
              --test-results-path="./test-results/component"
      - store_test_results:
          path: ./test-results

  # ── Build verification ─────────────────────────────────────────────────────
  build:
    parameters:
      node-version:
        type: string
    executor: default
    resource_class: medium
    steps:
      - checkout
      - install-deps:
          node-version: << parameters.node-version >>
      - run:
          name: Production build
          command: pnpm run build
      - store_artifacts:
          path: dist
          destination: dist-node<< parameters.node-version >>

# ---------------------------------------------------------------------------
# Workflow
# ---------------------------------------------------------------------------
workflows:
  ci:
    jobs:
      # Static checks first – fast, resource-light, no Node matrix needed.
      - lint
      - type-check

      # Tests and build run on both active LTS lines (Node 20 & 22).
      # Each job fans out once per node-version via the matrix.
      # Test jobs additionally fan out across parallel containers; within
      # each container `circleci tests run` further narrows the work via
      # Smarter Testing (selective execution + failed-only reruns).
      - test-unit:
          matrix:
            parameters:
              node-version: ["20", "22"]
          requires:
            - lint
            - type-check

      - test-component:
          matrix:
            parameters:
              node-version: ["20", "22"]
          requires:
            - lint
            - type-check

      - build:
          matrix:
            parameters:
              node-version: ["20", "22"]
          requires:
            - lint
            - type-check
